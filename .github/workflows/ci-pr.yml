name: CI PR

on:
  pull_request:
    branches:
      - develop
      - staging
      - production
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate branch naming and PR flow
        run: |
          HEAD="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"

          echo "Source branch: $HEAD"
          echo "Target branch: $BASE"

          TEMP_BRANCH_REGEX='^(feature|fix|hotfix|chore)/KAN-[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$'

          is_valid_temp_branch=false
          is_valid_main_branch=false

          if [[ "$HEAD" =~ $TEMP_BRANCH_REGEX ]]; then
            is_valid_temp_branch=true
          fi

          if [[ "$HEAD" == "develop" || "$HEAD" == "staging" ]]; then
            is_valid_main_branch=true
          fi

          if [[ "$is_valid_temp_branch" == "false" && "$is_valid_main_branch" == "false" ]]; then
            echo "Invalid source branch name: $HEAD"
            echo "Allowed examples:"
            echo "  feature/KAN-123-create-login-flow"
            echo "  fix/KAN-456-correct-timeout"
            echo "  hotfix/KAN-789-fix-production-crash"
            echo "  chore/KAN-321-update-ci"
            echo "  develop"
            echo "  staging"
            exit 1
          fi

          case "$BASE" in
            develop)
              if [[ "$HEAD" =~ ^(feature|fix|chore)/KAN-[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                exit 0
              fi

              if [[ "$HEAD" =~ ^hotfix/KAN-[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                exit 0
              fi

              echo "Invalid PR flow: $HEAD -> $BASE"
              exit 1
              ;;
            staging)
              if [[ "$HEAD" == "develop" ]]; then
                exit 0
              fi

              if [[ "$HEAD" =~ ^hotfix/KAN-[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                exit 0
              fi

              echo "Invalid PR flow: $HEAD -> $BASE"
              exit 1
              ;;
            production)
              if [[ "$HEAD" == "staging" ]]; then
                exit 0
              fi

              if [[ "$HEAD" =~ ^hotfix/KAN-[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                exit 0
              fi

              echo "Invalid PR flow: $HEAD -> $BASE"
              exit 1
              ;;
            *)
              echo "Unsupported target branch: $BASE"
              exit 1
              ;;
          esac

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: governance
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: governance
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: governance
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
